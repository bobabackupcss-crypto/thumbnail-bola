<!DOCTYPE html>
<html>
<head>
<title>Auto Thumbnail Bola</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial;
}

.card{
width:1280px;
height:720px;
background:#222;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
color:yellow;
font-size:60px;
}

.teams{
display:flex;
align-items:center;
gap:80px;
margin-top:20px;
}

.team img{
width:150px;
}

h2{
font-size:80px;
}

h3{
color:lime;
font-size:60px;
}
</style>

</head>

<body>

<div class="card">

<h1>PREDIKSI PIALA DUNIA</h1>

<div class="teams">
  <div class="team">
    <img src="https://flagcdn.com/w320/be.png">
    <p id="home">HOME</p>
  </div>

  <h2>VS</h2>

  <div class="team">
    <img src="https://flagcdn.com/w320/ir.png">
    <p id="away">AWAY</p>
  </div>
</div>

<h3 id="score">0 - 0</h3>

<p id="date">DATE</p>

</div>

<script>
fetch("match.json")
.then(res => res.json())
.then(data => {

document.getElementById("home").innerText = data.home;
document.getElementById("away").innerText = data.away;
document.getElementById("score").innerText = data.score;
document.getElementById("date").innerText = data.date;

});
</script>

</body>
</html>
